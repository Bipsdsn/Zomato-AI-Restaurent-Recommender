<style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@500;600;700&display=swap');
        
        .glass-surface {
            background-color: rgba(28, 28, 28, 0.75);
            backdrop-filter: blur(24px) saturate(150%);
            -webkit-backdrop-filter: blur(24px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        
        @keyframes slideUpFadeIn {
            0% {
                opacity: 0;
                transform: translate(-50%, -40%) scale(0.95);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        @keyframes checkmarkPulse {
            0% { transform: scale(0.8); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        .toast-animate {
            animation: slideUpFadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        .icon-pulse {
            animation: checkmarkPulse 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 0.2s;
            opacity: 0;
            animation-fill-mode: both;
        }
    </style>
