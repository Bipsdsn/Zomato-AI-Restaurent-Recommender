<style>
        .glass-panel {
            background: rgba(42, 42, 42, 0.4);
            backdrop-filter: blur(20px) saturate(150%);
            -webkit-backdrop-filter: blur(20px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }
        
        .input-focus-glow:focus {
            outline: none;
            border-color: #E23744;
            box-shadow: 0 0 15px rgba(226, 55, 68, 0.3);
        }

        .slide-up-enter {
            transform: translateY(100%);
            opacity: 0;
        }
        .slide-up-enter-active {
            transform: translateY(0);
            opacity: 1;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease-out;
        }
        
        .slide-up-leave {
            transform: translateY(0);
            opacity: 1;
        }
        .slide-up-leave-active {
            transform: translateY(100%);
            opacity: 0;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease-in;
        }

        .shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0) 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body-md overflow-hidden antialiased flex flex-col h-screen">
<!-- Background Context (Blurred Results) -->

<div class="h-full w-full bg-surface-container" data-alt="A blurred background showing an appetizing layout of high-end dark mode food recommendation cards. Subtle hints of deep blacks, rich red accents, and glossy food photography are visible through the heavy glassmorphic blur, establishing a premium, night-out dining aesthetic." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAHbdBm_8LSk26FY7XLQZIgjNKiYkvU4DDbhgTfAeF_G9SMIYwfMEen2f_SRQWzoThEKHT_Pc0rOiG2VApBAe-VmvmJhaRarfdIxqDC01leREANLVg-qh3FUD4kTv1GTISEsN-QNV7f6d5md1EMNIj3AlQlUyQ-RRSAEUqzK9muZBvFAqIs2ZJYinCIhv78Odb4_q36CDyQ8L1hVgzuIm36KjO1g6rxCYGwDGdBTxgZA9p7h0ncJeneJQNTXeUfHdckLGdoF0wstYw')"></div>
</div>
<!-- Scrim -->
<div class="absolute inset-0 bg-black/60 z-10 transition-opacity duration-300" id="scrim"></div>
<!-- Main Container -->
<main class="flex-1 flex flex-col justify-end z-20 relative h-full w-full max-w-3xl mx-auto pb-4 px-4 md:px-0">
<!-- Bottom Sheet -->
<div class="glass-panel w-full rounded-t-[32px] rounded-b-xl flex flex-col p-6 md:p-8 slide-up-enter slide-up-enter-active" id="refine-sheet">
<!-- Handle -->
<div class="w-12 h-1.5 bg-white/20 rounded-full mx-auto mb-6 cursor-grab"></div>
<!-- Header -->
<div class="flex justify-between items-center mb-6">
<h2 class="font-headline-md text-headline-md text-on-surface">Refine Search</h2>
<button class="text-on-surface-variant hover:text-white transition-colors" id="close-btn">
<span class="material-symbols-outlined text-2xl">close</span>
</button>
</div>
<!-- Input Area -->
<div class="mb-8 relative">
<div class="absolute left-4 top-1/2 -translate-y-1/2 flex items-center pointer-events-none text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<input class="w-full bg-surface-container-high/50 border border-white/10 text-on-surface placeholder:text-on-surface-variant/50 rounded-xl py-4 pl-12 pr-4 font-body-lg text-body-lg input-focus-glow transition-all" id="refine-input" placeholder="Try: cheaper options, more spicy food..." type="text"/>

<h3 class="font-headline-md text-headline-md text-on-surface mb-2">Refining your tastes...</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Looking for slightly cheaper, spicier options.</p>
</div>
</main>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const sheet = document.getElementById('refine-sheet');
            const scrim = document.getElementById('scrim');
            const input = document.getElementById('refine-input');
            const chips = document.querySelectorAll('.chip');
            const updateBtn = document.getElementById('update-btn');
            const closeBtn = document.getElementById('close-btn');
            const loadingState = document.getElementById('loading-state');
            const bgContext = document.getElementById('background-context');

            // Handle chip selection
            chips.forEach(chip => {
                chip.addEventListener('click', () => {
                    const text = chip.textContent.trim().replace(/^[a-z_]+/, '').trim(); // Remove icon text
                    input.value = text;
                    input.focus();
                    
                    // Visual feedback on chip
                    chips.forEach(c => c.classList.remove('bg-primary/20', 'border-primary/50', 'text-primary'));
                    chip.classList.add('bg-primary/20', 'border-primary/50', 'text-primary');
                });
            });

            // Handle closing
            const closeSheet = () => {
                sheet.classList.remove('slide-up-enter-active');
                sheet.classList.add('slide-up-leave-active');
                scrim.style.opacity = '0';
                
                setTimeout(() => {
                    // For demo purposes, we don't actually navigate away, just reset
                    sheet.style.display = 'none';
                }, 300);
            };

            closeBtn.addEventListener('click', closeSheet);
            scrim.addEventListener('click', closeSheet);

            // Handle submission
            updateBtn.addEventListener('click', () => {
                // Collapse sheet
                sheet.classList.remove('slide-up-enter-active');
                sheet.classList.add('slide-up-leave-active');
                
                // Show loading state
                setTimeout(() => {
                    sheet.style.display = 'none';
                    loadingState.classList.remove('hidden');
                    
                    // Animate background out of blur to simulate results refreshing
                    setTimeout(() => {
                         bgContext.classList.remove('blur-sm', 'scale-95', 'opacity-50');
                         bgContext.classList.add('blur-none', 'scale-100', 'opacity-100');
                         scrim.style.opacity = '0';
                    }, 1500);

                }, 300);
            });
            
            // Auto-focus input after a slight delay to allow slide animation
            setTimeout(() => {
                input.focus();
            }, 500);
        });
    </script>
